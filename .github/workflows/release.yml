# Branch push: sync remote → semver bump → commit/tag/push (GITHUB_TOKEN does not fire
# follow-up workflows) → publish Electron in the same run via workflow_call.
# Tag push / workflow_dispatch: publish only (e.g. manual tag or PAT-triggered tag builds).

name: Release Electron App

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Semver bump & tag
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'branch' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    outputs:
      bumped: ${{ steps.publish.outputs.bumped }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync with remote (avoid non-fast-forward push)
        run: |
          git fetch origin "$GITHUB_REF_NAME"
          git pull --rebase origin "$GITHUB_REF_NAME"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump patch (semver)
        id: bump
        run: |
          pnpm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, push
        id: publish
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --staged --quiet; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            echo "No staged changes; skipping."
            exit 0
          fi
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          TAG="v${NEW_VERSION}"
          git tag -a "$TAG" -m "v${NEW_VERSION}"
          git push origin "$TAG"
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      # Draft exists immediately so you can review on GitHub even if a matrix leg fails later.
      - name: Create or refresh draft GitHub Release
        if: steps.publish.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="v${VERSION}"
          NOTES="Draft: desktop builds attach as matrix jobs finish. Publish the release when you approve."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --draft --notes "$NOTES" || true
          else
            gh release create "$TAG" --draft --title "$TAG" --notes "$NOTES"
          fi

  # Same workflow run as bump — required because pushes with GITHUB_TOKEN do not start new runs.
  electron-after-bump:
    name: Electron (post-bump)
    needs: bump
    if: needs.bump.outputs.bumped == 'true'
    uses: ./.github/workflows/electron-publish-matrix.yml
    secrets: inherit

  # Tag push or manual run — no bump job, so no needs: bump (skipped jobs break dependents).
  electron-from-tag-or-dispatch:
    name: Electron (tag or dispatch)
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    uses: ./.github/workflows/electron-publish-matrix.yml
    secrets: inherit
