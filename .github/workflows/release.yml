# Semver bump + tag on main/master, then Electron artifacts via tag push (one GitHub Release from electron-builder).

name: Release Electron App

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      include_macos:
        description: "Include macOS build"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Semver bump & tag
    if: >-
      github.event_name == 'push' &&
      github.ref_type == 'branch' &&
      !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump patch (semver)
        id: bump
        run: |
          pnpm version patch --no-git-tag-version
          echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, push
        id: publish
        env:
          NEW_VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          if git diff --staged --quiet; then
            echo "No staged changes; skipping."
            exit 0
          fi
          git commit -m "chore: release v${NEW_VERSION} [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          TAG="v${NEW_VERSION}"
          git tag -a "$TAG" -m "v${NEW_VERSION}"
          git push origin "$TAG"

  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from secret
        shell: bash
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "Missing secret ENV_FILE. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          printf "%s" "$ENV_FILE_CONTENT" > .env

      - name: Build Web and Electron Assets
        run: pnpm run build

      - name: Build and Publish Electron App
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

  release_macos:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_macos == true }}
    name: Release (macos-latest)
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from secret
        shell: bash
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "Missing secret ENV_FILE. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          printf "%s" "$ENV_FILE_CONTENT" > .env

      - name: Build Web and Electron Assets
        run: pnpm run build

      - name: Build and Publish Electron App
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
