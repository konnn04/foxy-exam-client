# Called from release.yml — Linux / Windows / macOS matrix (uiohook-napi needs X11 headers on Linux).
on:
  workflow_call:

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux native build deps (uiohook-napi / libuiohook X11)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxtst-dev libxi-dev libxrandr-dev libxinerama-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from secret
        shell: bash
        env:
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          if [ -z "$ENV_FILE_CONTENT" ]; then
            echo "Missing secret ENV_FILE. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          printf "%s" "$ENV_FILE_CONTENT" > .env

      - name: Build Web and Electron Assets
        run: pnpm run build

      - name: Build and Publish Electron App
        run: pnpm exec electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
