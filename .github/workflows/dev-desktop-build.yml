# Dev desktop installers + draft Release (tag dev-desktop).
# Triggers: push to branch `dev`, or manual workflow_dispatch.
# Secret: ENV_FILE_DEV (same shape as ENV_FILE).

name: Dev desktop build

on:
  workflow_dispatch:
  push:
    branches:
      - dev

permissions:
  contents: write

concurrency:
  group: dev-desktop-build
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Dev build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux native build deps (uiohook-napi)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxt-dev libxtst-dev libxi-dev libxrandr-dev libxinerama-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from ENV_FILE_DEV
        shell: bash
        env:
          ENV_FILE_DEV_CONTENT: ${{ secrets.ENV_FILE_DEV }}
        run: |
          if [ -z "$ENV_FILE_DEV_CONTENT" ]; then
            echo "Missing secret ENV_FILE_DEV. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf "%s" "$ENV_FILE_DEV_CONTENT" > .env

      - name: Build (Vite development mode)
        run: pnpm run build:dev

      - name: Package Electron (current runner OS, no publish)
        shell: bash
        run: pnpm exec electron-builder --publish never '-c.productName=Foxy Exam (Dev)'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foxy-exam-dev-${{ matrix.os }}
          path: release/
          if-no-files-found: error

  dev-release:
    name: Update draft Release (dev-desktop)
    needs: build
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Download all OS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: foxy-exam-dev-*
          merge-multiple: false

      - name: Recreate draft release with installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p upload
          mapfile -t RAW < <(find artifacts -type f \( -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.dmg" \) | sort)
          if [[ ${#RAW[@]} -eq 0 ]]; then
            echo "No .exe / .AppImage / .deb / .dmg under artifacts/"
            find artifacts -type f | head -80 || true
            exit 1
          fi
          for f in "${RAW[@]}"; do
            base=$(basename "$f")
            dest="upload/${base}"
            if [[ -f "$dest" ]]; then
              dest="upload/$(echo "$f" | tr '/' '_')"
            fi
            cp -f "$f" "$dest"
          done
          mapfile -t ASSETS < <(find upload -type f | sort)
          if gh release view dev-desktop >/dev/null 2>&1; then
            gh release delete dev-desktop --yes --cleanup-tag
          fi
          gh api --silent -X DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/dev-desktop" 2>/dev/null || true
          gh release create dev-desktop \
            --draft \
            --title "Foxy Exam — Dev desktop (latest manual build)" \
            --notes "Built by **Dev desktop build** workflow. Vite \`development\` mode + \`ENV_FILE_DEV\`. Publish or discard when done." \
            "${ASSETS[@]}"
