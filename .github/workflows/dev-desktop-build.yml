# Manual-only: dev-configured desktop installers for QA (no GitHub Release).
# Repo secret: ENV_FILE_DEV (full .env file content, same shape as ENV_FILE).

name: Dev desktop build

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dev-desktop-build
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Dev build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Linux native build deps (uiohook-napi)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libx11-dev libxt-dev libxtst-dev libxi-dev libxrandr-dev libxinerama-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env from ENV_FILE_DEV
        shell: bash
        env:
          ENV_FILE_DEV_CONTENT: ${{ secrets.ENV_FILE_DEV }}
        run: |
          if [ -z "$ENV_FILE_DEV_CONTENT" ]; then
            echo "Missing secret ENV_FILE_DEV. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          printf "%s" "$ENV_FILE_DEV_CONTENT" > .env

      - name: Build (Vite development mode)
        run: pnpm run build:dev

      - name: Package Electron (current runner OS, no publish)
        shell: bash
        run: pnpm exec electron-builder --publish never '-c.productName=Foxy Exam (Dev)'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: foxy-exam-dev-${{ matrix.os }}
          path: release/
          if-no-files-found: error
